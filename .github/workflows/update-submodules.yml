name: Update Submodules

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-submodules:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: diplodoc-platform/setup-node-action@v1
        with:
          node-version: ${{ vars.NODE_VERSION || '24' }}
          registry-url: 'https://registry.npmjs.org'
          cache: ''
          run-install: 'false'

      - name: Update submodules to remote HEAD
        run: |
          git submodule sync --recursive
          # Drop any local changes that могут появиться из-за EOL/smudge-фильтров
          # и блокировать checkout (например, перезаписанный CONTRIBUTING.md).
          git submodule foreach --recursive 'git reset --hard && git clean -fdx'
          git submodule update --init --recursive --remote --force

      - name: Check if there are changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: update submodules to latest"
          else
            echo "No changes to commit."
          fi

      - name: Push changes
        if: always()
        run: |
          if [ -n "$(git log -1 --pretty=%B | grep 'chore: update submodules')" ]; then
            git push origin HEAD:${{ github.ref_name }}
          fi
