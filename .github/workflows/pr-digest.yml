name: PR Digest

on:
  schedule:
    # 11:00 MSK (UTC+3) = 08:00 UTC, weekdays only
    - cron: '0 8 * * 1-5'
    # 17:00 MSK (UTC+3) = 14:00 UTC, weekdays only
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  pr-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run PR digest
        env:
          GH_TOKEN: ${{ secrets.PR_DIGEST_GH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.PR_DIGEST_TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.PR_DIGEST_TG_CHAT_ID }}
          GITHUB_TELEGRAM_MAP: ${{ secrets.PR_DIGEST_GH_TG_MAP }}
        run: node scripts/pr-digest.mjs
